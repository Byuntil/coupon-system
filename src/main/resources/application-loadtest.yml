spring:
  datasource:
    url: jdbc:mysql://mysql:3306/coupondb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: coupon
    password: coupon
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  data:
    redis:
      host: redis
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1

coupon:
  strategy: db

logging:
  level:
    root: INFO
    cloud.coupon: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,hikaricp
  metrics:
    export:
      influx:
        uri: http://influxdb:8086
        db: k6
        step: 10s
        auto-create-db: false
    tags:
      application: coupon-system
